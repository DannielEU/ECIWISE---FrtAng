<div #stage class="landing" id="main-content" tabindex="-1">
  <canvas #canvas class="landing__canvas" aria-hidden="true"></canvas>

  <header class="landing__bar">
    <eci-logo home="/" />
    <div class="landing__controls">
      <eci-language-switch />
      <eci-theme-toggle />
      <eci-a11y-toggle />
    </div>
  </header>

  <main class="landing__hero">
    <h1 class="landing__title">{{ 'app.name' | translate }}</h1>
    <p class="landing__tagline">{{ 'app.tagline' | translate }}</p>
    <div class="landing__cta">
      <eci-button (click)="goToLogin()">{{ 'common.enter' | translate }}</eci-button>
      <eci-button variant="secondary" (click)="goToRegister()">
        {{ 'common.register' | translate }}
      </eci-button>
    </div>
  </main>
</div>

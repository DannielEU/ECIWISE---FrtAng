<div class="dia" [formGroup]="group()">
  <div class="dia__grid">
    <label class="dia__field">
      <span class="dia__label">{{ 'datosIa.labels.gender' | translate }}</span>
      <select formControlName="gender">
        <option [ngValue]="null" disabled>{{ 'datosIa.selectPlaceholder' | translate }}</option>
        @for (o of genderOptions; track o.value) {
          <option [ngValue]="o.value">{{ 'datosIa.options.gender.' + o.key | translate }}</option>
        }
      </select>
    </label>

    <label class="dia__field">
      <span class="dia__label">{{ 'datosIa.labels.ethnicity' | translate }}</span>
      <select formControlName="ethnicity">
        <option [ngValue]="null" disabled>{{ 'datosIa.selectPlaceholder' | translate }}</option>
        @for (o of ethnicityOptions; track o.value) {
          <option [ngValue]="o.value">{{ 'datosIa.options.ethnicity.' + o.key | translate }}</option>
        }
      </select>
    </label>

    <label class="dia__field">
      <span class="dia__label">{{ 'datosIa.labels.parentalEducation' | translate }}</span>
      <span class="dia__hint">{{ 'datosIa.hints.parentalEducation' | translate }}</span>
      <select formControlName="parentalEducation">
        <option [ngValue]="null" disabled>{{ 'datosIa.selectPlaceholder' | translate }}</option>
        @for (o of parentalEducationOptions; track o.value) {
          <option [ngValue]="o.value">
            {{ 'datosIa.options.parentalEducation.' + o.key | translate }}
          </option>
        }
      </select>
    </label>

    <label class="dia__field">
      <span class="dia__label">{{ 'datosIa.labels.parentalSupport' | translate }}</span>
      <span class="dia__hint">{{ 'datosIa.hints.parentalSupport' | translate }}</span>
      <select formControlName="parentalSupport">
        <option [ngValue]="null" disabled>{{ 'datosIa.selectPlaceholder' | translate }}</option>
        @for (o of parentalSupportOptions; track o.value) {
          <option [ngValue]="o.value">
            {{ 'datosIa.options.parentalSupport.' + o.key | translate }}
          </option>
        }
      </select>
    </label>

    <label class="dia__field">
      <span class="dia__label">{{ 'datosIa.labels.studyTimeWeekly' | translate }}</span>
      <span class="dia__hint">{{ 'datosIa.hints.studyTimeWeekly' | translate }}</span>
      <input type="number" formControlName="studyTimeWeekly" min="0" max="20" step="0.5" />
    </label>

    <label class="dia__field">
      <span class="dia__label">{{ 'datosIa.labels.absences' | translate }}</span>
      <span class="dia__hint">{{ 'datosIa.hints.absences' | translate }}</span>
      <input type="number" formControlName="absences" min="0" max="30" step="1" />
    </label>
  </div>

  <fieldset class="dia__checks">
    <legend class="dia__checks-title">{{ 'datosIa.labels.activitiesTitle' | translate }}</legend>
    <div class="dia__checks-grid">
      @for (c of checks; track c) {
        <label class="dia__check">
          <input type="checkbox" [formControlName]="c" />
          <span>{{ 'datosIa.labels.' + c | translate }}</span>
        </label>
      }
    </div>
  </fieldset>
</div>

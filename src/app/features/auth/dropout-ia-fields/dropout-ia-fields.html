<div class="dia" [formGroup]="group()">
  <div class="dia__grid">
    @for (f of selectFields; track f.control) {
      <label class="dia__field">
        <span class="dia__label">{{ 'datosIa.dropout.labels.' + f.control | translate }}</span>
        <select [formControlName]="f.control">
          <option [ngValue]="null" disabled>{{ 'datosIa.selectPlaceholder' | translate }}</option>
          @for (o of f.options; track o.value) {
            <option [ngValue]="o.value">
              {{ 'datosIa.dropout.options.' + f.control + '.' + o.key | translate }}
            </option>
          }
        </select>
      </label>
    }

    @for (f of numberFields; track f.control) {
      <label class="dia__field">
        <span class="dia__label">{{ 'datosIa.dropout.labels.' + f.control | translate }}</span>
        <span class="dia__hint">{{ 'datosIa.dropout.hints.' + f.control | translate }}</span>
        <input
          type="number"
          [formControlName]="f.control"
          [min]="f.min"
          [max]="f.max"
          [step]="f.step"
        />
      </label>
    }
  </div>

  <fieldset class="dia__checks">
    <legend class="dia__checks-title">{{ 'datosIa.dropout.yesNoTitle' | translate }}</legend>
    <div class="dia__grid">
      @for (c of yesNoFields; track c) {
        <label class="dia__field">
          <span class="dia__label">{{ 'datosIa.dropout.labels.' + c | translate }}</span>
          <select [formControlName]="c">
            <option [ngValue]="null" disabled>{{ 'datosIa.selectPlaceholder' | translate }}</option>
            @for (o of yesNo; track o.value) {
              <option [ngValue]="o.value">{{ 'datosIa.yesNo.' + o.key | translate }}</option>
            }
          </select>
        </label>
      }
    </div>
  </fieldset>
</div>
